<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Actual Game</title>
<style>
body { margin:0; overflow:hidden; background:#0b0b0b; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; }
.screen {
position:fixed; top:0; left:0; width:100vw; height:100vh;
background:rgba(0,0,0,0.9);
display:flex; justify-content:center; align-items:center; flex-direction:column;
color:white;
}
#gameOver { display:none; }
button { padding:12px 24px; font-size:18px; margin:8px; }
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<div id="ui"></div>

<div id="startScreen" class="screen">
<h1>ACTUAL GAME</h1>
<button onclick="startGame()">Start</button>
</div>

<div id="gameOver" class="screen">
<h1 id="finalText"></h1>
<button onclick="restart()">Menu</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let player, bullets, enemies;
let score, lives, gameRunning, spawnRate;
let lastShot = 0;

/* INPUT */
let keys={}, mouse={x:0,y:0,down:false};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);
canvas.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);

/* START */
function startGame(){
document.getElementById("startScreen").style.display="none";

player={x:canvas.width/2,y:canvas.height/2,r:15,speed:5};
bullets=[]; enemies=[];
score=0; lives=3;
spawnRate=40;

// instant chaos
for(let i=0;i<8;i++) spawnEnemy();

gameRunning=true;
}

/* SHOOT */
function shoot(){
let now=Date.now();
if(now-lastShot < 100) return;
lastShot=now;

let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({x:player.x,y:player.y,dx:Math.cos(a)*12,dy:Math.sin(a)*12,r:4});
}

/* ENEMY SPAWN */
function spawnEnemy(){
let side=Math.floor(Math.random()*4);
let x,y;

if(side===0){ x=0; y=Math.random()*canvas.height; }
if(side===1){ x=canvas.width; y=Math.random()*canvas.height; }
if(side===2){ x=Math.random()*canvas.width; y=0; }
if(side===3){ x=Math.random()*canvas.width; y=canvas.height; }

enemies.push({
x,y,
r:15,
speed:2 + Math.random()*1.5,
hp:2
});
}

/* UPDATE */
function update(){
if(!gameRunning) return;

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

if(mouse.down) shoot();

bullets.forEach((b,i)=>{
b.x+=b.dx; b.y+=b.dy;
if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
bullets.splice(i,1);
}
});

enemies.forEach((e,i)=>{
let a=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(a)*e.speed;
e.y+=Math.sin(a)*e.speed;

if(Math.hypot(player.x-e.x,player.y-e.y)<player.r+e.r){
enemies.splice(i,1);
lives--;
if(lives<=0){
gameRunning=false;
document.getElementById("gameOver").style.display="flex";
document.getElementById("finalText").innerText="Score: "+score;
}
}

bullets.forEach((b,j)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+b.r){
e.hp--;
bullets.splice(j,1);
if(e.hp<=0){
enemies.splice(i,1);
score+=10;
}
}
});
});
}

/* DRAW */
function draw(){
ctx.fillStyle="#0b0b0b";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="lime";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="red";
enemies.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
});
}

/* LOOP */
let timer=0;
function loop(){
update();
draw();

if(gameRunning){
timer++;
if(timer>spawnRate){
spawnEnemy();
timer=0;

// difficulty ramps up
if(spawnRate>15) spawnRate--;
}

document.getElementById("ui").innerText =
"Score: "+score+" | ❤️".repeat(lives);
}

requestAnimationFrame(loop);
}

function restart(){
document.getElementById("gameOver").style.display="none";
document.getElementById("startScreen").style.display="flex";
gameRunning=false;
}

loop();
</script>

</body>
</html>
