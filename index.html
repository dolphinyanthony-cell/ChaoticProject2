<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shooter Improved Audio</title>
<style>
body { margin:0; overflow:hidden; background:#0b0b0b; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; }
#gameOver {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}
button { padding:10px 20px; font-size:18px; }
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">Score: 0</div>

<div id="gameOver">
    <h1 id="finalText"></h1>
    <button onclick="restart()">Restart</button>
</div>

<script>
/* =========================
   CANVAS
========================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* =========================
   AUDIO ENGINE
========================= */
let audioCtx;
let masterGain;
let audioStarted = false;

function startAudio() {
    if (audioStarted) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    audioStarted = true;
    startMusic();
}

/* =========================
   NOISE GENERATOR
========================= */
function createNoise(duration, volume) {
    let buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
    }

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;

    let gain = audioCtx.createGain();
    gain.gain.value = volume;

    source.connect(gain);
    gain.connect(masterGain);

    source.start();
    source.stop(audioCtx.currentTime + duration);
}

/* =========================
   OSC HELPER
========================= */
function playTone(freq, type, duration, volume, glide=false) {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    if (glide) {
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, audioCtx.currentTime + duration);
    }

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}

/* =========================
   SOUND EFFECTS
========================= */
function shootSound() {
    if (!audioStarted) return;

    // Quick noise burst (gun click/pop)
    createNoise(0.05, 0.2);

    // Pitch drop tone (body of shot)
    playTone(600, "square", 0.08, 0.15, true);
}

function hitSound() {
    if (!audioStarted) return;

    createNoise(0.08, 0.25);
    playTone(120, "triangle", 0.15, 0.2, true);
}

/* =========================
   MUSIC SYSTEM
========================= */
let step = 0;

// Smooth chord progression (sounds way nicer)
const chords = [
    [261.6, 329.6, 392.0], // C
    [220.0, 261.6, 329.6], // Am
    [196.0, 246.9, 329.6], // G
    [174.6, 220.0, 261.6]  // F
];

function startMusic() {
    setInterval(() => {
        if (!gameRunning) return;

        playMusicLayer();
        step++;

    }, 300); // slower = less annoying
}

/* =========================
   MUSIC LAYERS
========================= */
function playMusicLayer() {
    let chord = chords[step % chords.length];

    // Soft pad (background)
    chord.forEach(freq => {
        playTone(freq, "sine", 0.4, 0.05);
    });

    // Bass (not every beat)
    if (step % 2 === 0) {
        playTone(chord[0] / 2, "triangle", 0.25, 0.08);
    }

    // Melody (random but controlled)
    if (Math.random() < 0.5) {
        let note = chord[Math.floor(Math.random() * chord.length)] * 2;
        playTone(note, "sine", 0.15, 0.07);
    }
}

/* =========================
   GAME
========================= */
let keys = {};
let mouse = { x:0, y:0, down:false };

let player = { x:canvas.width/2, y:canvas.height/2, r:15, speed:4 };
let bullets = [];
let enemies = [];
let score = 0;
let gameRunning = true;

/* INPUT */
document.addEventListener("click", startAudio);
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

canvas.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
canvas.addEventListener("mousedown", ()=> mouse.down=true);
canvas.addEventListener("mouseup", ()=> mouse.down=false);

/* SHOOT */
function shoot() {
    let angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);

    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(angle)*10,
        dy:Math.sin(angle)*10,
        r:4
    });

    shootSound();
}

/* SPAWN */
function spawnEnemy() {
    enemies.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:15,
        speed:1+Math.random()*1.5
    });
}

/* UPDATE */
function update() {
    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    if(mouse.down) shoot();

    bullets.forEach((b,i)=>{
        b.x+=b.dx; b.y+=b.dy;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
        }
    });

    enemies.forEach((e,i)=>{
        let angle = Math.atan2(player.y-e.y, player.x-e.x);
        e.x += Math.cos(angle)*e.speed;
        e.y += Math.sin(angle)*e.speed;

        bullets.forEach((b,j)=>{
            let d = Math.hypot(b.x-e.x,b.y-e.y);
            if(d < e.r + b.r){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score+=10;
                hitSound();
            }
        });
    });
}

/* DRAW */
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="lime";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
        ctx.fill();
    });
}

/* LOOP */
let spawnTimer = 0;

function loop() {
    if(!gameRunning) return;

    update();
    draw();

    spawnTimer++;
    if(spawnTimer>50){
        spawnEnemy();
        spawnTimer=0;
    }

    document.getElementById("ui").innerText="Score: "+score;

    requestAnimationFrame(loop);
}

/* RESTART */
function restart(){
    bullets=[]; enemies=[]; score=0;
    gameRunning=true;
    document.getElementById("gameOver").style.display="none";
    loop();
}

/* START */
loop();
</script>

</body>
</html>
