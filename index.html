<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shooter Fixed</title>
<style>
body { margin:0; overflow:hidden; background:#0b0b0b; }
canvas { display:block; }

/* UI */
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
}

/* START / GAME OVER SCREEN */
#overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-family:Arial;
    z-index:10;
}

button {
    padding:12px 24px;
    font-size:20px;
    margin-top:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">Score: 0</div>

<div id="overlay">
    <h1 id="overlayText">Click Start to Play</h1>
    <button id="startBtn">Start Game</button>
</div>

<script>
/* =========================
   CANVAS SETUP
========================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* =========================
   GAME STATE
========================= */
let gameRunning = false;
let started = false;

/* =========================
   PLAYER
========================= */
let player = { x:300, y:300, r:15, speed:4 };
let bullets = [];
let enemies = [];
let score = 0;

/* INPUT */
let keys = {};
let mouse = {x:0,y:0,down:false};

document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove", e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});
canvas.addEventListener("mousedown", ()=>mouse.down=true);
canvas.addEventListener("mouseup", ()=>mouse.down=false);

/* =========================
   AUDIO (SAFE START)
========================= */
let audioCtx, masterGain;

function startAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
}

/* SOUND */
function playTone(freq,type,duration,volume){
    if(!audioCtx) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type=type;
    osc.frequency.value=freq;

    gain.gain.value=volume;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+duration);
    osc.stop(audioCtx.currentTime+duration);
}

function shootSound(){
    playTone(500,"square",0.07,0.2);
}

function hitSound(){
    playTone(120,"triangle",0.15,0.3);
}

/* =========================
   START GAME
========================= */
document.getElementById("startBtn").onclick = startGame;

function startGame(){
    document.getElementById("overlay").style.display="none";

    startAudio();

    resetGame();
    gameRunning = true;
    started = true;
}

/* RESET */
function resetGame(){
    bullets=[];
    enemies=[];
    score=0;
    player.x = canvas.width/2;
    player.y = canvas.height/2;
}

/* SHOOT */
function shoot(){
    let angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);

    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(angle)*10,
        dy:Math.sin(angle)*10,
        r:4
    });

    shootSound();
}

/* SPAWN */
function spawnEnemy(){
    enemies.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:15,
        speed:1+Math.random()*1.5
    });
}

/* =========================
   UPDATE
========================= */
function update(){
    if(!gameRunning) return;

    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    if(mouse.down) shoot();

    bullets.forEach((b,i)=>{
        b.x+=b.dx;
        b.y+=b.dy;

        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
        }
    });

    enemies.forEach((e,i)=>{
        let angle=Math.atan2(player.y-e.y,player.x-e.x);
        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;

        let dist = Math.hypot(player.x-e.x,player.y-e.y);
        if(dist < player.r + e.r){
            gameOver();
        }

        bullets.forEach((b,j)=>{
            let d=Math.hypot(b.x-e.x,b.y-e.y);
            if(d < e.r + b.r){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score+=10;
                hitSound();
            }
        });
    });
}

/* DRAW (ALWAYS RUNS) */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // draw player always so screen isn't blank
    ctx.fillStyle="lime";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();

    if(!started) return;

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
        ctx.fill();
    });
}

/* LOOP */
let spawnTimer=0;

function loop(){
    update();
    draw();

    if(gameRunning){
        spawnTimer++;
        if(spawnTimer>50){
            spawnEnemy();
            spawnTimer=0;
        }

        document.getElementById("ui").innerText="Score: "+score;
    }

    requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver(){
    gameRunning=false;

    let overlay = document.getElementById("overlay");
    overlay.style.display="flex";

    document.getElementById("overlayText").innerText =
        "Game Over - Score: " + score;
}

/* START LOOP ALWAYS */
loop();
</script>

</body>
</html>
