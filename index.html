<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shooter Final</title>
<style>
body { margin:0; overflow:hidden; background:#0b0b0b; }
canvas { display:block; }

#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
}

/* START + GAME OVER SCREEN */
#overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-family:Arial;
}

button {
    padding:12px 24px;
    font-size:20px;
    margin-top:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>
<div id="ui">Score: 0</div>

<div id="overlay">
    <h1 id="overlayText">Click Start</h1>
    <button onclick="startGame()">Start</button>
</div>

<script>
/* =========================
   CANVAS
========================= */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* =========================
   AUDIO
========================= */
let audioCtx, masterGain, audioStarted = false;

function startAudio() {
    if (audioStarted) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    audioStarted = true;
    startMusic();
}

/* SOUND HELPERS */
function playTone(freq, type, duration, volume, glide=false) {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    if (glide) {
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, audioCtx.currentTime + duration);
    }

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}

function createNoise(duration, volume) {
    let buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
    }

    let source = audioCtx.createBufferSource();
    let gain = audioCtx.createGain();

    gain.gain.value = volume;

    source.buffer = buffer;
    source.connect(gain);
    gain.connect(masterGain);

    source.start();
    source.stop(audioCtx.currentTime + duration);
}

/* SOUND EFFECTS */
function shootSound() {
    if (!audioStarted) return;
    createNoise(0.05, 0.2);
    playTone(600, "square", 0.08, 0.15, true);
}

function hitSound() {
    if (!audioStarted) return;
    createNoise(0.08, 0.25);
    playTone(120, "triangle", 0.15, 0.2, true);
}

/* =========================
   MUSIC
========================= */
let step = 0;
const chords = [
    [261.6,329.6,392],
    [220,261.6,329.6],
    [196,246.9,329.6],
    [174.6,220,261.6]
];

function startMusic() {
    setInterval(()=>{
        if (!gameRunning) return;

        let chord = chords[step % chords.length];

        chord.forEach(freq=>{
            playTone(freq,"sine",0.4,0.05);
        });

        if(step % 2 === 0){
            playTone(chord[0]/2,"triangle",0.25,0.08);
        }

        if(Math.random()<0.5){
            let note = chord[Math.floor(Math.random()*chord.length)]*2;
            playTone(note,"sine",0.15,0.07);
        }

        step++;
    },300);
}

/* =========================
   GAME VARIABLES
========================= */
let keys = {};
let mouse = {x:0,y:0,down:false};

let player = {x:canvas.width/2,y:canvas.height/2,r:15,speed:4};
let bullets = [];
let enemies = [];
let score = 0;
let gameRunning = false;

/* INPUT */
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

canvas.addEventListener("mousemove", e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});
canvas.addEventListener("mousedown", ()=>mouse.down=true);
canvas.addEventListener("mouseup", ()=>mouse.down=false);

/* START GAME */
function startGame(){
    document.getElementById("overlay").style.display="none";
    resetGame();
    startAudio();
    gameRunning = true;
    loop();
}

/* RESET */
function resetGame(){
    bullets=[];
    enemies=[];
    score=0;
    player.x=canvas.width/2;
    player.y=canvas.height/2;
}

/* SHOOT */
function shoot(){
    let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);

    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(angle)*10,
        dy:Math.sin(angle)*10,
        r:4
    });

    shootSound();
}

/* SPAWN */
function spawnEnemy(){
    enemies.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:15,
        speed:1+Math.random()*1.5
    });
}

/* UPDATE */
function update(){
    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    if(mouse.down) shoot();

    bullets.forEach((b,i)=>{
        b.x+=b.dx; b.y+=b.dy;
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){
            bullets.splice(i,1);
        }
    });

    enemies.forEach((e,i)=>{
        let angle=Math.atan2(player.y-e.y,player.x-e.x);
        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;

        // 💀 PLAYER COLLISION (NEW FIX)
        let dist = Math.hypot(player.x - e.x, player.y - e.y);
        if(dist < player.r + e.r){
            gameOver();
        }

        bullets.forEach((b,j)=>{
            let d=Math.hypot(b.x-e.x,b.y-e.y);
            if(d < e.r + b.r){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score+=10;
                hitSound();
            }
        });
    });
}

/* DRAW */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="lime";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
        ctx.fill();
    });
}

/* LOOP */
let spawnTimer=0;

function loop(){
    if(!gameRunning) return;

    update();
    draw();

    spawnTimer++;
    if(spawnTimer>50){
        spawnEnemy();
        spawnTimer=0;
    }

    document.getElementById("ui").innerText="Score: "+score;

    requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver(){
    gameRunning=false;
    document.getElementById("overlay").style.display="flex";
    document.getElementById("overlayText").innerText="Game Over - Score: "+score;
}
</script>

</body>
</html>
